<!DOCTYPE html>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

}
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #1a1a2e; color: #fffeec;
  font: 13px/1.4 'DotGothic16', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  letter-spacing: 0.05em; touch-action: none;
}
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  background: linear-gradient(180deg,#158a90,#137a7f);
  border-bottom: 1px solid #86cecb;
  display: flex; align-items: center; gap: 5px; padding: 0 10px;
  z-index: 100; overflow-x: auto; flex-shrink: 0;
}
.tb-title { font-size: 14px; font-weight: 800; color: #fffeec; margin-right: 2px; white-space: nowrap; }
.tb-sep   { width: 1px; height: 28px; background: #86cecb; margin: 0 2px; flex-shrink: 0; }
.tb-btn {
  padding: 6px 11px; border: 1px solid #86cecb; border-radius: 6px;
  background: #c3e5e7; color: #373b3e; font: inherit; font-size: 12px; cursor: pointer;
  white-space: nowrap; transition: background 0.12s; flex-shrink: 0; letter-spacing: 0.04em;
}
.tb-btn:hover  { background: #86cecb; }
.tb-btn.active { background: #e12885; border-color: #c0206a; color: #fffeec; }
.tb-spacer { flex: 1; }

#main {
  position: fixed; top: 48px; bottom: 0; left: 0; right: 0;
  display: flex; flex-direction: column;
}
#viewport { flex: 1; position: relative; min-height: 0; }
#webgl-canvas { width: 100%; height: 100%; display: block; touch-action: none; outline: none; }

/* ── Long-press indicator ─── */
#press-ring {
  position: fixed; pointer-events: none; z-index: 200; display: none;
  width: 52px; height: 52px; border-radius: 50%;
  border: 3px solid #e12885;
  transform: translate(-50%,-50%) scale(0);
  transition: transform 0.28s ease-out, opacity 0.15s;
}
#press-ring.show { display: block; }
#press-ring.grow { transform: translate(-50%,-50%) scale(1); }

/* ── Ear anatomy labels ─── */
#ear-labels {
  position: absolute; inset: 0; pointer-events: none; display: none;
}
.ear-label {
  position: absolute; background: rgba(20,130,135,0.85);
  color: #fffeec; font-size: 11px; padding: 2px 7px; border-radius: 4px;
  white-space: nowrap; pointer-events: none;
}
.ear-label::after {
  content: ''; position: absolute; width: 30px; height: 1px;
  background: rgba(134,206,203,0.7);
}

/* ── Bottom panel ─── */
#bottom-panel {
  background: #0d0d1a; border-top: 2px solid #137a7f;
  flex-shrink: 0; display: flex; flex-direction: column;
  max-height: 220px;
}
/* Finger tabs */
#finger-tabs {
  display: flex; border-bottom: 1px solid #137a7f; flex-shrink: 0;
}
.finger-tab {
  flex: 1; padding: 8px 0; font: inherit; font-size: 11px;
  background: #111122; color: #86cecb; border: none; cursor: pointer;
  border-right: 1px solid #1e2040; transition: background 0.1s;
}
.finger-tab:last-child { border-right: none; }
.finger-tab.active { background: #137a7f; color: #fffeec; }
.finger-tab:hover:not(.active) { background: #1a1a40; }

/* Sliders area */
#slider-area {
  flex: 1; overflow-y: auto; padding: 6px 10px;
}
.slider-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
}
.slider-label { font-size: 11px; color: #86cecb; width: 90px; flex-shrink: 0; }
.slider-range  { flex: 1; accent-color: #e12885; cursor: pointer; min-width: 0; }
.slider-val    { font-size: 11px; color: #fffeec; width: 34px; text-align: right; flex-shrink: 0; }

/* Presets */
#presets {
  display: flex; gap: 5px; padding: 5px 10px; border-top: 1px solid #1e2040;
  overflow-x: auto; flex-shrink: 0;
}
.preset-btn {
  padding: 5px 10px; border: 1px solid #137a7f; border-radius: 5px;
  background: #1a1a3a; color: #86cecb; font: inherit; font-size: 11px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background 0.1s;
}
.preset-btn:hover { background: #137a7f; color: #fffeec; }
</style>
</head>
<body>

<div id="toolbar">
  <span class="tb-title">✋ 手・耳</span>
  <div class="tb-sep"></div>
  <button class="tb-btn active" id="btn-hand">✋ 手</button>
  <button class="tb-btn"        id="btn-ear" >👂 耳</button>
  <div class="tb-sep"></div>
  <button class="tb-btn"        id="btn-side">右</button>
  <div class="tb-sep"></div>
  <button class="tb-btn"        id="btn-reset">リセット</button>
  <div class="tb-spacer"></div>
  <button class="tb-btn"        id="btn-shot">📷</button>
  <div class="tb-sep"></div>
  <a href="miku-viewer.html" class="tb-btn" style="text-decoration:none;">← 全身</a>

<div id="main">
  <div id="viewport">
    <canvas id="webgl-canvas"></canvas>
    <div id="ear-labels"></div>
  </div>

  <div id="bottom-panel">
    <div id="finger-tabs">
      <button class="finger-tab active" data-finger="thumb" >親指</button>
      <button class="finger-tab"        data-finger="index" >人差し</button>
      <button class="finger-tab"        data-finger="middle">中指</button>

      <button class="preset-btn" data-preset="fist">握る</button>

      <button class="preset-btn" data-preset="peace">ピース</button>
      <button class="preset-btn" data-preset="ok">OK</button>

      <button class="preset-btn" data-preset="rock">ロック</button>
    </div>
  </div>
</div>

<div id="press-ring"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════
//  Three.js core
// ═══════════════════════════════════════════════════════
const canvas   = document.getElementById('webgl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
renderer.outputColorSpace  = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x22223a);
scene.fog = new THREE.Fog(0x22223a, 60, 120);

const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 200);
camera.position.set(0, 12, 38);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping  = true;
controls.dampingFactor  = 0.10;
controls.minDistance    = 5;
controls.maxDistance    = 100;
controls.target.set(0, 10, 0);

// ── Lighting ──────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff8f0, 0.55));

const keyLight = new THREE.DirectionalLight(0xfffaf0, 1.6);
keyLight.position.set(10, 18, 14);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.near = 5;
keyLight.shadow.camera.far  = 80;
keyLight.shadow.camera.left = keyLight.shadow.camera.bottom = -20;
keyLight.shadow.camera.right = keyLight.shadow.camera.top  =  20;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xc8d8ff, 0.55);
fillLight.position.set(-10, 6, 10);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffddcc, 0.35);
rimLight.position.set(0, -4, -14);
scene.add(rimLight);

// Ground for shadow reception
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.ShadowMaterial({ opacity: 0.18 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1;
ground.receiveShadow = true;
scene.add(ground);

// ═══════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════
let currentMode = 'hand';   // 'hand' | 'ear'
let currentSide = 'right';  // 'right' | 'left'
let currentFinger = 'thumb';

let handRoot = null; // THREE.Group
let earRoot  = null; // THREE.Group

// Map: THREE.Mesh → joint THREE.Object3D (for raycasting)
const meshToJoint = new Map();
// Map: joint name → THREE.Object3D
const jointObjects = {};

// ── Joint angles (degrees) ────────────────────────────
const FINGER_NAMES = ['index','middle','ring','pinky'];

function defaultAngles() {
  const a = {
    thumb_cmc_open: 35,  // CMC abduction (0=closed, 80=open)
    thumb_cmc_opp:  0,   // CMC opposition / rotation
    thumb_mcp_flex: 0,
    thumb_ip_flex:  0,
  };
  for (const n of FINGER_NAMES) {
    a[`${n}_mcp_spread`] = 0;
    a[`${n}_mcp_flex`]   = 0;
    a[`${n}_pip_flex`]   = 0;
    a[`${n}_dip_flex`]   = 0;
  }
  return a;
}
let angles = defaultAngles();

// ═══════════════════════════════════════════════════════
//  Materials (helpers)
// ═══════════════════════════════════════════════════════
const mkSkin = () => new THREE.MeshStandardMaterial({
  color: 0xf4c49a, roughness: 0.62, metalness: 0.03,
});
const mkKnuckle = () => new THREE.MeshStandardMaterial({
  color: 0xdda07a, roughness: 0.78, metalness: 0.0,
});
const mkNail = () => new THREE.MeshStandardMaterial({
  color: 0xffd6d8, roughness: 0.22, metalness: 0.18,
});
const mkRidge = () => new THREE.MeshStandardMaterial({
  color: 0xe8a070, roughness: 0.72, metalness: 0.01,
});

// ═══════════════════════════════════════════════════════
//  HAND MODEL BUILDER
// ═══════════════════════════════════════════════════════
// All dimensions in cm-like units (1 unit ≈ 1 cm).
// Coordinate system (right hand, palm toward viewer):
//   +Y = toward fingertips,  +X = toward pinky,  +Z = toward viewer (palm side)
// Left hand = mirror via handRoot.scale.x = -1

const DEG = THREE.MathUtils.degToRad;

// Finger layout: [name, x, yBase, [proxLen, midLen, distLen], radius]
const FINGER_DATA = [
  ['index',  -2.2,  8.5,  [3.8, 2.8, 2.2],  0.70],
  ['middle', -0.5,  8.8,  [4.2, 3.0, 2.4],  0.76],
  ['ring',    1.2,  8.5,  [3.9, 2.8, 2.2],  0.68],
  ['pinky',   2.8,  7.8,  [2.8, 2.0, 1.6],  0.56],
];

// Make a capsule mesh whose bottom sits at y=0, top at y=totalLen
function mkCapsule(radius, totalLen, mat) {
  const cylLen = Math.max(0.05, totalLen - 2 * radius);
  const geo = new THREE.CapsuleGeometry(radius, cylLen, 4, 12);
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  m.position.y = totalLen / 2;
  return m;
}
function mkSphere(r, mat) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 10, 10), mat);
  m.castShadow = true;
  return m;
}
function mkNailMesh(r, distLen) {
  // Small flat box on dorsal side of distal phalanx
  const geo = new THREE.BoxGeometry(r * 1.55, 0.07, distLen * 0.58);
  const m = new THREE.Mesh(geo, mkNail());
  m.position.set(0, distLen * 0.42, -r * 0.90);
  return m;
}

function addJointMesh(parent, mesh, jointObj) {
  parent.add(mesh);
  meshToJoint.set(mesh, jointObj);
}

function buildHand() {
  if (handRoot) { scene.remove(handRoot); handRoot = null; }
  meshToJoint.clear();
  Object.keys(jointObjects).forEach(k => delete jointObjects[k]);

  handRoot = new THREE.Group();
  handRoot.receiveShadow = true;

  const skin = mkSkin();
  const knuckle = mkKnuckle();

  // ── Forearm stub ──────────────────────────────────────
  const forearm = mkCapsule(1.45, 4.0, skin);
  forearm.position.set(0, -2, 0);
  handRoot.add(forearm);

  // ── Palm ─────────────────────────────────────────────
  // Tapered box: wider at knuckles (y=8.5), narrower at wrist (y=0)
  const palmGeo = new THREE.BoxGeometry(7.4, 8.5, 1.55, 3, 6, 2);
  const palmPos = palmGeo.attributes.position;
  for (let i = 0; i < palmPos.count; i++) {
    const yn = (palmPos.getY(i) + 4.25) / 8.5; // 0=wrist, 1=knuckles
    palmPos.setX(i, palmPos.getX(i) * (0.72 + 0.28 * yn));
    // Slightly arch the back-of-hand
    const xn = palmPos.getX(i) / 3.7;
    palmPos.setZ(i, palmPos.getZ(i) - Math.abs(xn) * 0.12);
  }
  palmGeo.computeVertexNormals();
  const palmMesh = new THREE.Mesh(palmGeo, skin);
  palmMesh.position.y = 4.25;
  palmMesh.castShadow = true;
  palmMesh.receiveShadow = true;
  handRoot.add(palmMesh);

  // ── Four fingers ──────────────────────────────────────
  for (const [name, x, yBase, lens, r] of FINGER_DATA) {
    // MCP joint (knuckle)
    const mcp = new THREE.Object3D(); mcp.name = `${name}_mcp`;
    mcp.position.set(x, yBase, 0);
    handRoot.add(mcp);
    jointObjects[`${name}_mcp`] = mcp;

    const kMesh = mkSphere(r * 1.06, knuckle);
    addJointMesh(mcp, kMesh, mcp);
    const prox = mkCapsule(r, lens[0], skin);
    addJointMesh(mcp, prox, mcp);

    // PIP joint
    const pip = new THREE.Object3D(); pip.name = `${name}_pip`;
    pip.position.y = lens[0];
    mcp.add(pip);
    jointObjects[`${name}_pip`] = pip;

    addJointMesh(pip, mkSphere(r * 0.93, knuckle), pip);
    addJointMesh(pip, mkCapsule(r * 0.92, lens[1], skin), pip);

    // DIP joint
    const dip = new THREE.Object3D(); dip.name = `${name}_dip`;
    dip.position.y = lens[1];
    pip.add(dip);
    jointObjects[`${name}_dip`] = dip;

    addJointMesh(dip, mkSphere(r * 0.83, knuckle), dip);
    const distMesh = mkCapsule(r * 0.82, lens[2], skin);
    addJointMesh(dip, distMesh, dip);

    // Fingertip
    const tip = mkSphere(r * 0.73, skin);
    tip.position.y = lens[2];
    addJointMesh(dip, tip, dip);

    // Nail
    dip.add(mkNailMesh(r * 0.82, lens[2]));
  }

  // ── Thumb ─────────────────────────────────────────────
  // CMC: attached at lateral palm, angles applied by applyAngles()
  const thumbCMC = new THREE.Object3D(); thumbCMC.name = 'thumb_cmc';
  thumbCMC.position.set(-3.75, 2.6, 0.25);
  handRoot.add(thumbCMC);
  jointObjects['thumb_cmc'] = thumbCMC;

  // Knuckle ball at thumb base
  const cmcBall = mkSphere(0.98, knuckle);
  addJointMesh(thumbCMC, cmcBall, thumbCMC);
  addJointMesh(thumbCMC, mkCapsule(0.90, 3.2, skin), thumbCMC);

  const thumbMCP = new THREE.Object3D(); thumbMCP.name = 'thumb_mcp';
  thumbMCP.position.y = 3.2;
  thumbCMC.add(thumbMCP);
  jointObjects['thumb_mcp'] = thumbMCP;

  addJointMesh(thumbMCP, mkSphere(0.86, knuckle), thumbMCP);
  addJointMesh(thumbMCP, mkCapsule(0.82, 2.8, skin), thumbMCP);

  const thumbIP = new THREE.Object3D(); thumbIP.name = 'thumb_ip';
  thumbIP.position.y = 2.8;
  thumbMCP.add(thumbIP);
  jointObjects['thumb_ip'] = thumbIP;

  addJointMesh(thumbIP, mkSphere(0.76, knuckle), thumbIP);
  const thumbDist = mkCapsule(0.74, 2.2, skin);
  addJointMesh(thumbIP, thumbDist, thumbIP);

  const thumbTip = mkSphere(0.64, skin);
  thumbTip.position.y = 2.2;
  addJointMesh(thumbIP, thumbTip, thumbIP);
  thumbIP.add(mkNailMesh(0.74, 2.2));

  // Mirror for left hand
  handRoot.scale.x = currentSide === 'left' ? -1 : 1;

  scene.add(handRoot);
  applyAngles();
}

// ── Apply joint angles from `angles` state ────────────
function applyAngles() {
  if (!handRoot) return;

  for (const [name] of FINGER_DATA) {
    const mcp = jointObjects[`${name}_mcp`];
    const pip = jointObjects[`${name}_pip`];
    const dip = jointObjects[`${name}_dip`];
    if (!mcp || !pip || !dip) continue;

    const flex   = angles[`${name}_mcp_flex`]   || 0;
    const spread = angles[`${name}_mcp_spread`]  || 0;
    const pipF   = angles[`${name}_pip_flex`]    || 0;
    const dipF   = angles[`${name}_dip_flex`]    || 0;

    mcp.rotation.set(DEG(spread), 0, -DEG(flex));
    pip.rotation.set(0, 0, -DEG(pipF));
    dip.rotation.set(0, 0, -DEG(dipF));
  }

  // Thumb: CMC controls base orientation + abduction/opposition
  const cmc = jointObjects['thumb_cmc'];
  const mcp = jointObjects['thumb_mcp'];
  const ip  = jointObjects['thumb_ip'];
  if (cmc && mcp && ip) {
    const open  = angles.thumb_cmc_open  || 0;   // abduction 0-80°
    const opp   = angles.thumb_cmc_opp   || 0;   // opposition 0-70°
    const mcpF  = angles.thumb_mcp_flex  || 0;
    const ipF   = angles.thumb_ip_flex   || 0;

    // Base pose: thumb spreads laterally+downward; open increases this
    // rotation.z = 90+open° makes the thumb's +Y point lower-laterally
    cmc.rotation.order = 'YZX';
    cmc.rotation.z = DEG(90 + open * 0.5);    // lateral abduction
    cmc.rotation.x = DEG(-18 - opp * 0.5);    // palmar abduction / opposition
    cmc.rotation.y = DEG(-opp * 0.6);         // axial rotation for opposition

    mcp.rotation.set(0, 0, -DEG(mcpF));
    ip.rotation.set( 0, 0, -DEG(ipF));
  }
}

// ═══════════════════════════════════════════════════════
//  EAR MODEL BUILDER
// ═══════════════════════════════════════════════════════
// Right ear viewed from outside (lateral). Coordinate center ≈ center of ear.
// Mirror X for left ear.

function buildEar() {
  if (earRoot) { scene.remove(earRoot); earRoot = null; }

  earRoot = new THREE.Group();

  const skin   = new THREE.MeshStandardMaterial({ color: 0xf0c08a, roughness: 0.66, metalness: 0.02, side: THREE.FrontSide });
  const ridge  = mkRidge();
  const cavity = new THREE.MeshStandardMaterial({ color: 0xc8885a, roughness: 0.82, metalness: 0.0 });

  // ── 1. Main ear base (extruded 2D shape) ────────────
  const earShape = new THREE.Shape();
  // Outer ear outline – clockwise from top
  earShape.moveTo(0.6, 3.2);
  earShape.bezierCurveTo( 1.8, 2.8,  2.2, 1.5,  2.2,  0.3);
  earShape.bezierCurveTo( 2.3,-0.8,  2.1,-1.8,  1.7, -2.4);
  earShape.bezierCurveTo( 1.3,-3.0,  0.7,-3.4,  0.1, -3.5);
  earShape.bezierCurveTo(-0.5,-3.6, -0.9,-3.3, -0.7, -2.8);
  earShape.bezierCurveTo(-0.5,-2.4, -1.2,-2.0, -1.5, -1.2);
  earShape.bezierCurveTo(-1.7,-0.4, -1.8, 0.4, -1.7,  1.2);
  earShape.bezierCurveTo(-1.6, 2.0, -1.3, 2.8, -0.6,  3.3);
  earShape.bezierCurveTo( 0.0, 3.6,  0.4, 3.4,  0.6,  3.2);

  const earBaseGeo = new THREE.ExtrudeGeometry(earShape, {
    depth: 0.5, bevelEnabled: true,
    bevelThickness: 0.18, bevelSize: 0.14, bevelSegments: 3,
  });
  earBaseGeo.translate(0, 0, -0.25);
  const earBase = new THREE.Mesh(earBaseGeo, skin);
  earBase.castShadow = true;
  earBase.receiveShadow = true;
  earRoot.add(earBase);

  // ── 2. Helix rim (outer rolled edge) ─────────────────
  const helixPts = [
    [0.2, -2.9, 0.10],
    [0.8, -2.4, 0.25],
    [1.4, -1.6, 0.38],
    [1.8, -0.5, 0.52],
    [2.0,  0.6, 0.62],
    [1.9,  1.7, 0.68],
    [1.5,  2.6, 0.65],
    [0.6,  3.2, 0.58],
    [-0.3, 3.4, 0.46],
    [-1.0, 2.8, 0.34],
    [-1.5, 1.8, 0.24],
    [-1.6, 0.6, 0.18],
    [-1.5,-0.5, 0.14],
    [-1.1,-1.5, 0.10],
  ].map(p => new THREE.Vector3(...p));

  const helixCurve = new THREE.CatmullRomCurve3(helixPts, false, 'catmullrom', 0.5);
  earRoot.add(new THREE.Mesh(
    new THREE.TubeGeometry(helixCurve, 48, 0.24, 8, false), ridge
  ));

  // ── 3. Antihelix – main stem ──────────────────────────
  const ahMain = [
    [ 0.1,-1.2, 0.60],
    [ 0.1,-0.3, 0.72],
    [ 0.1, 0.7, 0.80],
    [ 0.1, 1.5, 0.78],  // fork
  ].map(p => new THREE.Vector3(...p));
  earRoot.add(new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ahMain), 20, 0.20, 7, false), ridge
  ));

  // Antihelix superior crus (upper branch of Y)
  const ahSup = [
    [0.1, 1.5, 0.78],
    [0.5, 2.2, 0.70],
    [1.0, 2.8, 0.58],
  ].map(p => new THREE.Vector3(...p));
  earRoot.add(new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ahSup), 14, 0.16, 7, false), ridge
  ));

  // Antihelix inferior crus (lower branch of Y)
  const ahInf = [
    [0.1, 1.5, 0.78],
    [0.7, 1.2, 0.72],
    [1.3, 0.8, 0.60],
  ].map(p => new THREE.Vector3(...p));
  earRoot.add(new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ahInf), 12, 0.15, 7, false), ridge
  ));

  // ── 4. Concha (central cavity bowl) ──────────────────
  // A partial torus ring to suggest the bowl opening
  const conchaGeo = new THREE.TorusGeometry(0.85, 0.20, 8, 24, Math.PI * 1.6);
  const concha = new THREE.Mesh(conchaGeo, cavity);
  concha.position.set(0.15, -0.2, 0.70);
  concha.rotation.z = -0.4;
  earRoot.add(concha);

  // Ear canal opening (dark disc)
  const canalGeo = new THREE.CircleGeometry(0.38, 14);
  const canalMat = new THREE.MeshStandardMaterial({ color: 0x5a3018, roughness: 1.0, metalness: 0.0 });
  const canal = new THREE.Mesh(canalGeo, canalMat);
  canal.position.set(0.15, -0.2, 0.74);
  earRoot.add(canal);

  // ── 5. Tragus (small flap over ear canal) ────────────
  const tragusGeo = new THREE.SphereGeometry(0.38, 8, 8);
  tragusGeo.scale(1.6, 1.1, 0.75);
  const tragus = new THREE.Mesh(tragusGeo, skin);
  tragus.position.set(0.55, -1.55, 0.68);
  tragus.castShadow = true;
  earRoot.add(tragus);

  // ── 6. Antitragus ─────────────────────────────────────
  const atGeo = new THREE.SphereGeometry(0.30, 8, 8);
  atGeo.scale(1.3, 0.9, 0.75);
  const antitragus = new THREE.Mesh(atGeo, skin);
  antitragus.position.set(-0.45, -1.80, 0.68);
  earRoot.add(antitragus);

  // ── 7. Intertragic notch line ─────────────────────────
  const notchPts = [
    new THREE.Vector3( 0.45,-1.90, 0.65),
    new THREE.Vector3( 0.05,-1.95, 0.70),
    new THREE.Vector3(-0.35,-1.88, 0.65),
  ];
  earRoot.add(new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(notchPts), 8, 0.07, 5, false),
    cavity
  ));

  // ── 8. Earlobe ────────────────────────────────────────
  const earlobeGeo = new THREE.SphereGeometry(1.05, 14, 14);
  earlobeGeo.scale(0.95, 0.82, 0.55);
  const earlobe = new THREE.Mesh(earlobeGeo, skin);
  earlobe.position.set(0.05, -2.9, 0.15);
  earlobe.castShadow = true;
  earRoot.add(earlobe);

  // Mirror for left ear
  earRoot.scale.x = currentSide === 'left' ? -1 : 1;

  earRoot.visible = false; // hidden by default (hand shown first)
  scene.add(earRoot);
  updateEarLabels();
}

// ═══════════════════════════════════════════════════════
//  Camera animation helpers
// ═══════════════════════════════════════════════════════
let camAnim = null;
function animateCamTo(toPos, toTarget, dur = 0.7) {
  const sp = camera.position.clone();
  const st = controls.target.clone();
  const ep = new THREE.Vector3(...toPos);
  const et = new THREE.Vector3(...toTarget);
  const t0 = performance.now();
  camAnim = t => {
    const e = Math.min((t - t0) / (dur * 1000), 1);
    const s = e < 0.5 ? 2*e*e : -1+2*(2-e)*e; // ease in-out
    camera.position.lerpVectors(sp, ep, s);
    controls.target.lerpVectors(st, et, s);
    return e >= 1;
  };
}

const CAM = {
  hand: { pos: [0, 12, 38], target: [0, 10, 0] },
  ear:  { pos: [0,  0, 22], target: [0,  0, 0] },
};

// ═══════════════════════════════════════════════════════
//  Mode switching
// ═══════════════════════════════════════════════════════
function showMode(mode) {
  currentMode = mode;
  document.getElementById('btn-hand').classList.toggle('active', mode === 'hand');
  document.getElementById('btn-ear' ).classList.toggle('active', mode === 'ear');
  document.getElementById('bottom-panel').style.display = mode === 'hand' ? 'flex' : 'none';
  document.getElementById('ear-labels' ).style.display  = mode === 'ear'  ? 'block': 'none';

  if (handRoot) handRoot.visible = mode === 'hand';
  if (earRoot ) earRoot.visible  = mode === 'ear';

  const c = CAM[mode];
  animateCamTo(c.pos, c.target);
}

function updateSide() {
  const lbl = currentSide === 'right' ? '右' : '左';
  document.getElementById('btn-side').textContent = lbl;
  if (handRoot) handRoot.scale.x = currentSide === 'left' ? -1 : 1;
  if (earRoot ) earRoot.scale.x  = currentSide === 'left' ? -1 : 1;
}

// ═══════════════════════════════════════════════════════
//  Ear anatomy labels
// ═══════════════════════════════════════════════════════
const EAR_LABEL_DEFS = [
  { text: 'ヘリックス',  pos: [1.9,  1.2, 0.62] },
  { text: '対耳輪',      pos: [0.1,  0.7, 0.82] },
  { text: '耳甲介',      pos: [0.15,-0.2, 0.74] },
  { text: '耳珠',        pos: [0.55,-1.55,0.70] },
  { text: '対耳珠',      pos: [-0.45,-1.80,0.70] },
  { text: '耳垂',        pos: [0.05,-2.9, 0.20] },
];

function updateEarLabels() {
  const div = document.getElementById('ear-labels');
  div.innerHTML = '';
  EAR_LABEL_DEFS.forEach(({ text, pos }) => {
    const el = document.createElement('div');
    el.className = 'ear-label';
    el.textContent = text;
    el.dataset.px = pos[0]; el.dataset.py = pos[1]; el.dataset.pz = pos[2];
    div.appendChild(el);
  });
}

function refreshEarLabelPositions() {
  if (currentMode !== 'ear') return;
  const vp = document.getElementById('viewport');
  const W = vp.clientWidth, H = vp.clientHeight;
  document.querySelectorAll('.ear-label').forEach(el => {
    let px = parseFloat(el.dataset.px);
    const py = parseFloat(el.dataset.py);
    const pz = parseFloat(el.dataset.pz);
    if (earRoot) px *= earRoot.scale.x; // mirror
    const v = new THREE.Vector3(px, py, pz).project(camera);
    const sx = (v.x + 1) / 2 * W;
    const sy = (-v.y + 1) / 2 * H;
    if (v.z < 1) {
      el.style.left   = `${sx + 8}px`;
      el.style.top    = `${sy - 10}px`;
      el.style.display = 'block';
    } else {
      el.style.display = 'none';
    }
  });
}

// ═══════════════════════════════════════════════════════
//  Slider UI
// ═══════════════════════════════════════════════════════
const THUMB_SLIDERS = [
  { key: 'thumb_cmc_open', label: '開く/閉じる', min:  0, max: 80  },
  { key: 'thumb_cmc_opp',  label: '対立',         min:  0, max: 70  },
  { key: 'thumb_mcp_flex', label: '付け根を曲げ', min:  0, max: 60  },
  { key: 'thumb_ip_flex',  label: '先端を曲げ',   min:  0, max: 80  },
];
const FINGER_SLIDERS = [
  { key: '_mcp_spread', label: '横開き',       min: -25, max: 25  },
  { key: '_mcp_flex',   label: '付け根を曲げ', min:   0, max: 90  },
  { key: '_pip_flex',   label: '第1関節',       min:   0, max: 110 },
  { key: '_dip_flex',   label: '第2関節',       min:   0, max: 90  },
];

function buildSliders(finger) {
  const area = document.getElementById('slider-area');
  area.innerHTML = '';
  const defs = finger === 'thumb'
    ? THUMB_SLIDERS
    : FINGER_SLIDERS.map(d => ({ ...d, key: finger + d.key }));

  defs.forEach(({ key, label, min, max }) => {
    const row = document.createElement('div');
    row.className = 'slider-row';
    const val = angles[key] ?? 0;
    row.innerHTML = `
      <span class="slider-label">${label}</span>
      <input type="range" class="slider-range" data-key="${key}" min="${min}" max="${max}" step="1" value="${val}">
      <span class="slider-val">${Math.round(val)}°</span>`;
    area.appendChild(row);
    row.querySelector('input').addEventListener('input', e => {
      const v = parseFloat(e.target.value);
      angles[key] = v;
      e.target.nextElementSibling.textContent = `${Math.round(v)}°`;
      applyAngles();
    });
  });
}

function syncSliders() {
  document.querySelectorAll('.slider-range').forEach(el => {
    const key = el.dataset.key;
    const v = angles[key] ?? 0;
    el.value = v;
    el.nextElementSibling.textContent = `${Math.round(v)}°`;
  });
}

// ═══════════════════════════════════════════════════════
//  Preset poses
// ═══════════════════════════════════════════════════════
const PRESETS = {
  open: () => defaultAngles(),

  fist: () => {
    const a = defaultAngles();
    a.thumb_cmc_open = 22; a.thumb_cmc_opp = 40;
    a.thumb_mcp_flex = 50; a.thumb_ip_flex = 38;
    for (const n of FINGER_NAMES) {
      a[`${n}_mcp_flex`] = 80; a[`${n}_pip_flex`] = 98; a[`${n}_dip_flex`] = 70;
    }
    return a;
  },

  point: () => {
    const a = PRESETS.fist();
    a.index_mcp_flex = 0; a.index_pip_flex = 0; a.index_dip_flex = 0;
    a.index_mcp_spread = 0;
    a.thumb_cmc_open = 28; a.thumb_cmc_opp = 30; a.thumb_mcp_flex = 30; a.thumb_ip_flex = 20;
    return a;
  },

  peace: () => {
    const a = PRESETS.fist();
    a.index_mcp_flex = 0;  a.index_pip_flex = 0;  a.index_dip_flex = 0;
    a.middle_mcp_flex = 0; a.middle_pip_flex = 0; a.middle_dip_flex = 0;
    a.index_mcp_spread  = -12;
    a.middle_mcp_spread =  12;
    a.thumb_cmc_open = 30; a.thumb_mcp_flex = 20; a.thumb_ip_flex = 10;
    return a;
  },

  ok: () => {
    const a = defaultAngles();
    a.thumb_cmc_open = 20; a.thumb_cmc_opp = 50;
    a.thumb_mcp_flex = 30; a.thumb_ip_flex = 55;
    a.index_mcp_flex = 20; a.index_pip_flex = 80; a.index_dip_flex = 55;
    return a;
  },

  pinch: () => {
    const a = defaultAngles();
    a.thumb_cmc_open = 18; a.thumb_cmc_opp = 45;
    a.thumb_mcp_flex = 20; a.thumb_ip_flex = 40;
    a.index_mcp_flex = 15; a.index_pip_flex = 45; a.index_dip_flex = 30;
    a.middle_mcp_flex = 5; a.ring_mcp_flex = 5; a.pinky_mcp_flex = 5;
    return a;
  },

  rock: () => {
    const a = PRESETS.fist();
    a.index_mcp_flex = 0;  a.index_pip_flex = 0;  a.index_dip_flex = 0;
    a.pinky_mcp_flex = 0;  a.pinky_pip_flex = 0;  a.pinky_dip_flex = 0;
    a.index_mcp_spread = -10; a.pinky_mcp_spread = 10;
    return a;
  },
};

function applyPreset(name) {
  if (!PRESETS[name]) return;
  angles = PRESETS[name]();
  applyAngles();
  buildSliders(currentFinger);
}

// ═══════════════════════════════════════════════════════
//  Long-press + drag (direct bone rotation on 3D view)
// ═══════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const ring = document.getElementById('press-ring');
let pressTimer   = null;
let dragging     = false;
let activeJoint  = null;
let dragStart    = { x: 0, y: 0 };
let angleSnapshot = {};

const DRAG_SENSITIVITY = 0.5; // degrees per pixel

function getPointerPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

function hitTestJoint(px, py) {
  const rect = canvas.getBoundingClientRect();
  const nx = ((px - rect.left) / rect.width)  * 2 - 1;
  const ny = -((py - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera({ x: nx, y: ny }, camera);
  const meshes = [...meshToJoint.keys()];
  const hits = raycaster.intersectObjects(meshes);
  if (!hits.length) return null;
  return meshToJoint.get(hits[0].object) ?? null;
}

function startPress(e) {
  if (e.touches && e.touches.length > 1) return;
  const pos = getPointerPos(e);

  ring.style.left = pos.x + 'px'; ring.style.top = pos.y + 'px';
  ring.classList.add('show');
  requestAnimationFrame(() => ring.classList.add('grow'));

  pressTimer = setTimeout(() => {
    const joint = hitTestJoint(pos.x, pos.y);
    if (!joint) { cancelPress(); return; }
    activeJoint = joint;
    dragStart   = { ...pos };
    dragging    = true;
    angleSnapshot = { ...angles };
    controls.enabled = false;
    ring.classList.remove('show', 'grow');
    if (navigator.vibrate) navigator.vibrate(30);
  }, 300);
}

function onDrag(e) {
  if (e.cancelable) e.preventDefault();
  if (!dragging || !activeJoint) return;
  const pos = getPointerPos(e);
  const dx = pos.x - dragStart.x;
  const dy = pos.y - dragStart.y;

  const jn = activeJoint.name;
  if (jn === 'thumb_cmc') {
    angles.thumb_cmc_open = Math.max(0, Math.min(80,
      (angleSnapshot.thumb_cmc_open || 0) + dx * DRAG_SENSITIVITY));
    angles.thumb_cmc_opp  = Math.max(0, Math.min(70,
      (angleSnapshot.thumb_cmc_opp  || 0) - dy * DRAG_SENSITIVITY));
  } else if (jn === 'thumb_mcp') {
    angles.thumb_mcp_flex = Math.max(0, Math.min(60,
      (angleSnapshot.thumb_mcp_flex || 0) + dy * DRAG_SENSITIVITY));
  } else if (jn === 'thumb_ip') {
    angles.thumb_ip_flex = Math.max(0, Math.min(80,
      (angleSnapshot.thumb_ip_flex || 0) + dy * DRAG_SENSITIVITY));
  } else {
    // finger joints
    const parts = jn.split('_'); // e.g. ['index','mcp'] or ['index','pip']
    const [fn, jtype] = parts;
    if (jtype === 'mcp') {
      angles[`${fn}_mcp_flex`]   = Math.max(0, Math.min(90,
        (angleSnapshot[`${fn}_mcp_flex`] || 0) + dy * DRAG_SENSITIVITY));
      angles[`${fn}_mcp_spread`] = Math.max(-25, Math.min(25,
        (angleSnapshot[`${fn}_mcp_spread`] || 0) + dx * DRAG_SENSITIVITY));
    } else if (jtype === 'pip') {
      angles[`${fn}_pip_flex`] = Math.max(0, Math.min(110,
        (angleSnapshot[`${fn}_pip_flex`] || 0) + dy * DRAG_SENSITIVITY));
    } else if (jtype === 'dip') {
      angles[`${fn}_dip_flex`] = Math.max(0, Math.min(90,
        (angleSnapshot[`${fn}_dip_flex`] || 0) + dy * DRAG_SENSITIVITY));
    }
  }
  applyAngles();
  syncSliders();
}

function endPress() {
  cancelPress();
  if (dragging) {
    dragging = false; activeJoint = null;
    controls.enabled = true;
  }
}

function cancelPress() {
  clearTimeout(pressTimer); pressTimer = null;
  ring.classList.remove('show', 'grow');
}

canvas.addEventListener('pointerdown',  startPress, { passive: false });
canvas.addEventListener('pointermove',  onDrag,     { passive: false });
canvas.addEventListener('pointerup',    endPress);
canvas.addEventListener('pointercancel',endPress);
canvas.addEventListener('contextmenu',  e => e.preventDefault());

// ═══════════════════════════════════════════════════════
//  Toolbar events
// ═══════════════════════════════════════════════════════
document.getElementById('btn-hand').addEventListener('click', () => showMode('hand'));
document.getElementById('btn-ear' ).addEventListener('click', () => showMode('ear'));

document.getElementById('btn-side').addEventListener('click', () => {
  currentSide = currentSide === 'right' ? 'left' : 'right';
  updateSide();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (currentMode === 'hand') {
    angles = defaultAngles();
    applyAngles();
    buildSliders(currentFinger);
  } else {
    animateCamTo(CAM.ear.pos, CAM.ear.target, 0.5);
  }
});

document.getElementById('btn-shot').addEventListener('click', () => {
  renderer.render(scene, camera);
  const a = Object.assign(document.createElement('a'), {
    href: canvas.toDataURL('image/png'),
    download: 'hand-ear-pose.png',
  });
  a.click();
});

// Finger tabs
document.querySelectorAll('.finger-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.finger-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFinger = btn.dataset.finger;
    buildSliders(currentFinger);
  });
});

// Presets
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

// ═══════════════════════════════════════════════════════
//  Resize
// ═══════════════════════════════════════════════════════
function onResize() {
  const vp = document.getElementById('viewport');
  const W = vp.clientWidth, H = vp.clientHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
}
new ResizeObserver(onResize).observe(document.getElementById('viewport'));
onResize();

// ═══════════════════════════════════════════════════════
//  Render loop
// ═══════════════════════════════════════════════════════
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = performance.now();
  if (camAnim) {
    const done = camAnim(t);
    if (done) camAnim = null;
    controls.target.set(...controls.target.toArray()); // sync
  }
  controls.update();
  refreshEarLabelPositions();
  renderer.render(scene, camera);
}
animate();

// ═══════════════════════════════════════════════════════
//  Startup: build both models
// ═══════════════════════════════════════════════════════
buildHand();
buildEar();
showMode('hand');
buildSliders('thumb');

</script>
